  {id:211,cat:"A",first:"別習慣躲在舒適的高塔裡，",body:"那會讓你找不到真正的自己。\n只有永遠覺得不夠，\n才會不斷設法突破。"},
  {id:214,cat:"A",first:"人生難免有起有落，",body:"真正值得尊敬的人，\n不是看他在高峰時展現的驕傲，\n而是看他在低谷時接受的訕笑。"},
  {id:2,cat:"B",first:"花公司的時間，做自己的事情，",body:"不如花公司的時間，學自己的能耐。"},
  {id:3,cat:"B",first:"舞台上站多久不是重點，",body:"重要的是成為大家的焦點。\n整場跑龍套沒有意義，\n登台雖瞬間，傳頌已千年。"},
  {id:7,cat:"B",first:"當責學的不是公司期待，",body:"而是自我要求。"},
  {id:8,cat:"B",first:"老鷹信賴的不是樹枝，",body:"而是自己能翱翔的翅膀。\n職場靠的不是人際關係，\n而是拿出不怕背叛的本領。"},
  {id:11,cat:"B",first:"想要人前顯貴，",body:"難免人後受罪。\n所有看到的光鮮亮麗，\n背後必定有心酸淚滴。"},
  {id:21,cat:"B",first:"把事做完幾乎人人都會，",body:"重點在於有沒有把事做好。\n做完只是對公司有交代，\n做好才是對自己有交代。"},
  {id:24,cat:"B",first:"你的價值在於做出來的成就，",body:"而不是究竟在社會待了多久。\n會說不會做，\n很難佩服你的地位。"},
  {id:34,cat:"B",first:"一般的人，",body:"只會怪別人幫他找麻煩。\n優秀的人，\n會每天不斷地找自己麻煩。"},
  {id:40,cat:"B",first:"向上溝通不要覺得困難，",body:"只要注意一個重點，\n向上溝通，不是改變老闆，\n是改變老闆對你的態度。"},
  {id:44,cat:"B",first:"真正想成功的人，",body:"都是常找自己麻煩的人。\n麻煩就像檢測儀，\n幫我們看出更多不足的自己。"},
  {id:54,cat:"B",first:"與其花公司的時間，",body:"做自己的事情。\n不如花公司的時間，\n學自己的本領。"},
  {id:58,cat:"B",first:"職場有時候別太客氣，",body:"自己好，別只有自己知道。\n真正的千里馬不要孤芳自賞，\n不妨大膽走向你的伯樂。"},
  {id:76,cat:"B",first:"裝模作樣的主管，只會說往事，",body:"令人佩服的主管才能拿出真本事。"},
  {id:86,cat:"B",first:"聲音可以讓人轉過來，",body:"內容才能讓人聽進去。\n職稱只能讓人走過來，\n稱職才能讓人聽進去。"},
  {id:103,cat:"B",first:"想好事情的先後順序，",body:"才能幫助你的做事效率。\n每天做事情的順位，\n決定你未來的地位。"},
  {id:107,cat:"B",first:"拖延者只會說等我有空，",body:"執行者只習慣立刻去做。\n人生除了忙，只有更忙\n別把時間花在不是你的戰場。"},
  {id:108,cat:"B",first:"對的方法可以提高自己的身價，",body:"做不熟悉的事，找方法。\n做熟悉的事，換方法。"},
  {id:109,cat:"B",first:"有目標的5公里，",body:"勝過沒目標的1公里。\n人生不怕忙，\n但是怕忙得沒有方向。"},
  {id:129,cat:"B",first:"當你在打發時間的時候，",body:"其實也打發了自己。\n重視生活並沒有不對，\n只是生活不該是一種頹廢。"},
  {id:130,cat:"B",first:"請學會降低權力，提升影響力。",body:"最棒的影響力，就是\n用真正平等和尊重的態度，\n和對方討論每一件事情。"},
  {id:142,cat:"B",first:"習慣檢討和批評的人，",body:"不見得讓別人看到你的好，\n反而讓更多人看到你的不好。"},
  {id:145,cat:"B",first:"請別急著換工作崗位，",body:"除非你覺得已經百分百學會。\n請在公司搞懂最精華的3%，\n你才能學會真正的專業頂尖。"},
  {id:147,cat:"B",first:"頭銜需要實力相陪，",body:"才會贏得真正敬佩。\n別處心積慮的贏得頭銜，\n卻從頭到尾遭受人嫌。"},
  {id:155,cat:"B",first:"如果你工作常碰到煩惱，",body:"不妨當成遊戲換的視角，\n每個角色的出現都有用意，\n這一局結束後你就會明瞭。"},
  {id:162,cat:"B",first:"出發前請先選好你的路，",body:"先規劃你的人生地圖，\n如果前進了方向錯誤，\n再怎麼加速也沒有幫助。"},
  {id:173,cat:"B",first:"看事情要看大方向，",body:"帶好屬下要觀察小地方。\n把魄力和氣勢留給外人，\n用關心和體貼照顧同仁。"},
  {id:176,cat:"B",first:"95%的人為現在而學，",body:"5%的人為未來而練。\n如果你認為學問可以用很久，\n通常是你周遭有學問的人不多。"},
  {id:181,cat:"B",first:"如果你希望將來很值錢，",body:"請拿出同等值的信念。\n別人想付多少錢是看他甘願，\n你能值多少錢就看你表現。"},
  {id:185,cat:"B",first:"輕鬆應對，不是毫不在乎，",body:"而是依靠背後的苦練無數。"},
  {id:189,cat:"B",first:"幕前有多完美成功，",body:"幕後就要做多少苦工。\n所有舞台的喝采掌聲，\n都來自後台的苦練熱身。"},
  {id:191,cat:"B",first:"世上沒有完美的職位，",body:"只看你能發揮多少智慧。\n職位只是職場的虛名，\n中間的體會才是永遠的回味。"},
  {id:194,cat:"B",first:"如果願意改變，",body:"還能保有舞台空間。\n如果不願改變，\n被取代的考量就只剩時間。"},
  {id:207,cat:"B",first:"自主是你該有的權力，",body:"自律是你該有的能力。\n沒有控制自己的能力，\n別急著一直跟別人要權力。"},
  {id:208,cat:"B",first:"外表的效期，受限青春，",body:"頭腦的效期，終其一生。"},
  {id:209,cat:"B",first:"再累也別被看出疲憊。",body:"越成功的人其實越累，\n只是不讓你看到他的疲憊。"},
  {id:210,cat:"B",first:"企圖心不是要征服世界，",body:"而是要實踐自己的理念。"},
  {id:9,cat:"C",first:"感謝你的貴人提拔你，",body:"感恩你的小人打擊你。\n沒有提拔就不會爬得高，\n沒有打擊就不會站得穩。"},
  {id:17,cat:"C",first:"受人點滴恩惠，",body:"不會回報的是正常人，\n會回報的是有心人。"},
  {id:18,cat:"C",first:"人通常寧可花費三倍時間，",body:"企圖改變對方，\n卻不願意花費一倍時間，\n好好改變自己。"},
  {id:28,cat:"C",first:"你和誰在一起，決定了，",body:"接下來成為什麼樣的你。"},
  {id:33,cat:"C",first:"大多數的施捨，",body:"都是拿出家裡吃不下的。\n真正令我們佩服的，\n是家裡不夠，還願意分享。"},
  {id:38,cat:"C",first:"你的語氣，決定對方的口氣，",body:"不想看臭臉，就別先擺出來。"},
  {id:39,cat:"C",first:"急著就事論事，",body:"反而容易出事，\n要解決事情前，\n先解決心情。"},
  {id:46,cat:"C",first:"你以為在爭執「是非對錯」，",body:"其實在乎的是「個人感受」。\n爭吵的表面上都是事情，\n事情的背後說穿都是心情。"},
  {id:52,cat:"C",first:"適合你的圈子，",body:"從來不是讓你過得舒適。\n能夠讓你耳目一新的圈子，\n才能幫你自己不斷增值。"},
  {id:67,cat:"C",first:"每天最棒的學習就是，",body:"試著隨意找出3個人，\n和每個人都能聊3分鐘，\n並且每人產出3個心得。"},
  {id:70,cat:"C",first:"找出家人的頻率，",body:"話語才能切中標的。\n別聊自己想聊的，\n要聊對方聽得進去的。"},
  {id:71,cat:"C",first:"別只是羨慕而已，",body:"也請付出你的心力。"},
  {id:72,cat:"C",first:"如果沒把窗簾拉開，",body:"要怎麼責怪陽光進不來？\n想要得到別人的關懷，\n那就走出去，或者把門打開。"},
  {id:77,cat:"C",first:"當你堅持自己的頻率，",body:"只會讓世界逐漸遠去。\n當你放寬自己的頻率，\n所有的美好就會向你靠近。"},
  {id:78,cat:"C",first:"在別人需要幫忙的時候舉手，",body:"你也需要幫忙的時候，\n才會有人揮手。"},
  {id:91,cat:"C",first:"對事要精明快速，",body:"對人要和緩寬容。\n聰明的人只能解決事情，\n智慧的人可以安定人心。"},
  {id:144,cat:"C",first:"溝通的重心從來不在內容，",body:"表現得態度和神情才是關鍵。\n對方除了聽我們的內容，\n更在乎我們真正的內心。"},
  {id:149,cat:"C",first:"和別人過不去沒意義，",body:"因為對方心裡不見得在乎你。\n和別人賭氣也沒意義，\n因為真正耽誤的只有你自己。"},
  {id:165,cat:"C",first:"成功不是只靠自己，",body:"請學會感恩周遭的環境。\n時時保持謙虛與謝意，\n貴人才會優先看到你。"},
  {id:171,cat:"C",first:"我們生氣的常常不是事情，",body:"而是對方出現的反應。\n停留在對方的反應，\n只是跟自己過不去。"},
  {id:172,cat:"C",first:"說服不是大講道理，",body:"而是讓對方能認同你。\n專心和對方聊大事，\n不如關心對方在乎的小事。"},
  {id:179,cat:"C",first:"團隊的融合需要破冰，",body:"放下身段才能交心。\n能做得到的請拿出實力，\n做不到的請拿出誠意。"},
  {id:193,cat:"C",first:"科技方便了聯繫，",body:"別讓心靈產生更多距離。\n放下手機走到面前關心，\n人際互動才有溫馨的感動。"},
  {id:195,cat:"C",first:"孤獨和冷漠不是藉口，",body:"陪伴與關懷才是溫柔。\n只要我們願意伸出手，\n沒有人應該孤單獨走。"},
  {id:202,cat:"C",first:"不會感恩的人，",body:"給自己千百種理由，\n會感恩的人，\n哪怕只是一個小行動。"},
  {id:204,cat:"C",first:"別浪費時間不屑，",body:"多花點時間不懈，\n不想浪費時間的事，\n說聲謝謝就好。"},
  {id:1,cat:"D",first:"抱怨是本能，解決是本事。",body:"與其大聲抱怨，不如動手解決。"},
  {id:20,cat:"D",first:"指責和憤怒可以宣洩情緒，",body:"卻無法解決事情。\n或許贏了場面，\n其實輸了永遠。"},
  {id:25,cat:"D",first:"人生永遠羨慕得不到的，",body:"卻未必珍惜手邊有的。\n幸福不是追求，而是擁有。"},
  {id:29,cat:"D",first:"無解的常常不是問題，",body:"而是不想解決的自己。\n如果常常說可是，\n可能都是你不想解決的事。"},
  {id:35,cat:"D",first:"難過的感受別往心裡去，",body:"能不能跨過這道關卡，\n就看你在一段時間後，\n會執著在意，還是雲淡風輕？"},
  {id:57,cat:"D",first:"人生的壓力永遠不會減少，",body:"但是要學習讓快樂增加。"},
  {id:62,cat:"D",first:"情緒是自己的，",body:"管不好沒人能幫你。\n別贏了一時的場面，\n卻輸了未來的永遠。"},
  {id:65,cat:"D",first:"別一直羨慕得不到的，",body:"請先在乎手邊有的。\n幸福不是追求，\n而是珍惜自己擁有的。"},
  {id:73,cat:"D",first:"每天都在期待回報，",body:"從來不會讓你變好。\n當我們覺得上天不公，\n只會增加自己的苦惱。"},
  {id:75,cat:"D",first:"人都有情緒，",body:"很難忍住一口氣，\n其實真正阻擋你前進的，\n都是你的忍不住的脾氣。"},
  {id:80,cat:"D",first:"不管今天心情好不好，",body:"請留一點時間給它發酵。\n只有掌握自己情緒的邊界，\n你才有資格繼續挑戰這個世界。"},
  {id:81,cat:"D",first:"喝杯咖啡，抬頭仰望雲朵，",body:"何必在乎，雲來雲走，\n漫步海邊，靜看餘暉燈火，\n何必在乎，潮去潮落。"},
  {id:83,cat:"D",first:"快樂的人很難抱怨，",body:"抱怨的人很難快樂\n整天唉聲嘆氣的人，\n很難聽到機會在敲門。"},
  {id:87,cat:"D",first:"用泰然自若的神情，",body:"看世間變化的嘴臉。\n用輕鬆從容的態度，\n看浮沉名利的世界。"},
  {id:90,cat:"D",first:"社群的內容看看就好，",body:"太過在意只會徒增煩惱。\n不必把自己充實的生命，\n花在別人頹廢的生活上。"},
  {id:93,cat:"D",first:"心情的庫存是有限的，",body:"先想著快樂和開心，\n就放不下煩惱和傷心。\n先想什麼，就先放進什麼。"},
  {id:96,cat:"D",first:"不管今天多辛苦，",body:"我的心情我做主。"},
  {id:117,cat:"D",first:"昨天再精彩，都已經過去，",body:"今天再辛苦，還是要繼續。"},
  {id:131,cat:"D",first:"如果每天過得順暢，",body:"請當作一種生活。\n如果今天不那麼順暢，\n不妨當作一種修行。"},
  {id:132,cat:"D",first:"我無法掌握今天的環境，",body:"但是可以調整自己的心境。\n享受順境需要靠運氣，\n出現逆境其實是種福氣。"},
  {id:134,cat:"D",first:"請開始培養得分心態，",body:"凡事只看有利於我的內容。\n別讓扣分心態影響心情，\n別因為我的小瑕疵，喪失信心。"},
  {id:135,cat:"D",first:"如果你覺得周遭走得太慢，",body:"會不會是因為你走得太急？\n請讓自己的頭腦走在前面，\n別讓自己的嘴巴搶在前面。"},
  {id:137,cat:"D",first:"如果我的心胸夠大，",body:"放進去的都只是小事。\n如果我的心胸不夠寬廣，\n每一件放進去的都變大事。"},
  {id:146,cat:"D",first:"讓好的事情往心裡去，",body:"讓壞的事情往雲裡去，\n要往心裡或是雲裡，\n都是你一念之間的決定。"},
  {id:150,cat:"D",first:"有時候生活跟棒球賽一樣，",body:"某一個球揮棒落空的時候，\n你絕對不會停下來氣餒，\n立刻準備下一球才是重點。"},
  {id:174,cat:"D",first:"只要情緒高漲，智商就會下降。",body:"如果情緒商數足夠穩定，\n職場的交流互動才稱心如意。"},
  {id:175,cat:"D",first:"越在乎，時間過越慢，",body:"不在乎，時間就飛轉。\n人生的歲月很短，\n不該在乎的就放下別管。"},
  {id:183,cat:"D",first:"牽掛過去擔憂未來，",body:"無法釋懷，只會造成傷害。\n別想那麼多，只把握現在\n才不會讓執著變成阻礙。"},
  {id:184,cat:"D",first:"一句話能解何必悶，一陣子能解何必愁。",body:"打開自己的心門，不必往心裡去傷神。"},
  {id:205,cat:"D",first:"運用正面的賭氣，",body:"強化瞬間火力，\n突破不可能的難題。"},
  {id:212,cat:"D",first:"自己選的路，",body:"自己就要能撐住。\n學會讓快樂和壓力共處，\n你的人生才能翩翩起舞。"},
  {id:13,cat:"E",first:"與其給自己一萬個藉口，",body:"不如給自己一個行動的理由。"},
  {id:14,cat:"E",first:"想得再多也到不了終點，",body:"走的再慢遲早也會到終點。\n只要踏出第一步，\n就更接近目標了。"},
  {id:15,cat:"E",first:"如果想找出你真正的強項。",body:"你必須每天都做得不一樣。"},
  {id:22,cat:"E",first:"許多人離開校園就不再學習，",body:"其實畢業前學的只是基本配備。\n畢業趕快用，用完再去學，\n才能讓自己不斷的成長。"},
  {id:23,cat:"E",first:"當你在說的時候，",body:"你只是講出你會的。\n當你在聽的時候，\n你才能學到你不會的。"},
  {id:31,cat:"E",first:"寧願跌跌撞撞摸索，",body:"也不要從從容容求助。"},
  {id:48,cat:"E",first:"不要覺得很好，但是越做越糟。",body:"寧可碰到很糟，但是越做越好。"},
  {id:49,cat:"E",first:"拿出膽識，少說但是..",body:"未來才能說精彩的故事。"},
  {id:50,cat:"E",first:"每天做一件不擅長的事情，",body:"基於什麼動機都可以，\n從當中有一些體會學習，\n你的今天就算不虛此行。"},
  {id:60,cat:"E",first:"想得再多，長路仍然漫漫，",body:"只要起步，距離就只剩一半。"},
  {id:63,cat:"E",first:"任何投資都有賺有賠，",body:"唯獨學習是穩賺不賠。\n投資錯誤會血本無歸，\n投資自己是終身不虧。"},
  {id:64,cat:"E",first:"當你在說的時候，只是講出你會的。",body:"當你在聽的時候，才能學到自己不會的。"},
  {id:74,cat:"E",first:"想要破解，先去了解，",body:"別問答案，請找技巧。\n問到答案只能解決這一題，\n學到技巧才能解決每一題。"},
  {id:84,cat:"E",first:"人們的進步，",body:"通常不是好習慣越來越多，\n而是壞習慣越來越少。"},
  {id:94,cat:"E",first:"練功的機會其實每天都有，",body:"翻過面前的每一道牆，\n你才能讓自己比昨天更強。"},
  {id:95,cat:"E",first:"人生拼圖來自於每次的經驗，",body:"一個事件獲得拼圖一片，\n別放棄每個碎片的機會，\n才會讓你的拼圖完整呈現。"},

// ── State ──
let sharedVotes = {};   // from Firebase { id: count }
let myVotes = {};       // localStorage { id: true }
let rankFilter = "ALL";

// Load my votes from localStorage
try {
  const saved = localStorage.getItem("myvotes214");
  if (saved) myVotes = JSON.parse(saved);
} catch(e) {}

function saveMyVotes() {
  try { localStorage.setItem("myvotes214", JSON.stringify(myVotes)); } catch(e) {}
}

function myUsed() { return Object.keys(myVotes).length; }
function myRemaining() { return TOTAL_VOTES - myUsed(); }

// ── Firebase listener ──
const votesRef = ref(db, "votes");
onValue(votesRef, (snapshot) => {
  sharedVotes = snapshot.val() || {};
  renderAll();
  updateBar();
  if (document.getElementById("modalOverlay").classList.contains("active")) renderRanking();
});

// Show app after first data load
document.getElementById("loadingScreen").style.display = "none";
document.getElementById("app").style.display = "block";

// ── Vote handler ──
window.handleVote = async function(id) {
  const btn = document.getElementById("vbtn-" + id);
  if (btn) btn.disabled = true;

  const mine = !!myVotes[id];
  const delta = mine ? -1 : 1;

  if (!mine && myRemaining() <= 0) {
    showToast("⚠️ 你的50票已用完！取消已投的票再重新分配。");
    if (btn) btn.disabled = false;
    return;
  }

  // Optimistic local update
  if (mine) { delete myVotes[id]; }
  else { myVotes[id] = true; }
  saveMyVotes();
  updateCard(id);
  updateBar();

  // Firebase atomic update
  document.getElementById("syncingLabel").style.display = "inline";
  try {
    const qRef = ref(db, "votes/" + id);
    await runTransaction(qRef, (current) => {
      return Math.max(0, (current || 0) + delta);
    });
  } catch(e) {
    showToast("⚠️ 網路錯誤，請重試");
    // revert
    if (mine) { myVotes[id] = true; } else { delete myVotes[id]; }
    saveMyVotes();
    updateCard(id);
    updateBar();
  }
  document.getElementById("syncingLabel").style.display = "none";
  if (btn) btn.disabled = false;
};

// ── Render ──
function renderAll() {
  const main = document.getElementById("mainContent");
  if (main.innerHTML !== "" && main.dataset.built === "1") {
    // Just update counts
    QUOTES.forEach(q => updateCard(q.id));
    return;
  }
  main.innerHTML = "";
  main.dataset.built = "1";

  CATEGORIES.forEach((cat, ci) => {
    const catQuotes = QUOTES.filter(q => q.cat === cat.id);
    const sec = document.createElement("section");
    sec.className = "category";
    sec.style.animationDelay = ci * 0.05 + "s";
    sec.id = "cat-sec-" + cat.id;

    sec.innerHTML = `
      <div class="cat-header">
        <span class="cat-letter" style="color:${CAT_COLORS[cat.id]}">${cat.id}</span>
        <span class="cat-title">${cat.emoji} ${cat.name}</span>
        <span class="cat-total" id="cat-total-${cat.id}" style="display:none"></span>
        <span class="cat-info" id="cat-info-${cat.id}">${catQuotes.length} 則</span>
      </div>
      <div class="quotes-grid" id="grid-${cat.id}"></div>
    `;
    main.appendChild(sec);

    const grid = sec.querySelector("#grid-" + cat.id);
    catQuotes.forEach(q => {
      const card = document.createElement("div");
      card.className = "quote-card";
      card.id = "card-" + q.id;
      const lines = q.body.split("\n").join("<br>");
      card.innerHTML = `
        <div class="q-num">【${q.id}】</div>
        <div class="q-text"><span class="first">${q.first}</span><br>${lines}</div>
        <div class="q-footer">
          <button class="vote-btn" id="vbtn-${q.id}" onclick="handleVote(${q.id})">+ 投票</button>
          <div class="q-total" id="qtotal-${q.id}"></div>
        </div>
      `;
      grid.appendChild(card);
    });
  });
}

function updateCard(id) {
  const card = document.getElementById("card-" + id);
  const btn = document.getElementById("vbtn-" + id);
  const totalEl = document.getElementById("qtotal-" + id);
  if (!card) return;

  const mine = !!myVotes[id];
  const total = sharedVotes[id] || 0;

  card.className = "quote-card" + (mine ? " voted" : "");
  if (btn) btn.textContent = mine ? "✓ 已投票" : "+ 投票";

  if (totalEl) {
    totalEl.innerHTML = total > 0
      ? `<div class="num">${total}</div><div class="lbl">總票數</div>${mine ? '<div class="mine">✦ 包含你</div>' : ''}`
      : "";
  }

  // Update category totals
  const q = QUOTES.find(x => x.id === id);
  if (q) {
    const catQuotes = QUOTES.filter(x => x.cat === q.cat);
    const catTotal = catQuotes.reduce((s, x) => s + (sharedVotes[x.id] || 0), 0);
    const myInCat = catQuotes.filter(x => myVotes[x.id]).length;
    const totalEl2 = document.getElementById("cat-total-" + q.cat);
    const infoEl = document.getElementById("cat-info-" + q.cat);
    if (totalEl2) {
      totalEl2.textContent = "▲ " + catTotal + " 票";
      totalEl2.style.display = catTotal > 0 ? "inline" : "none";
    }
    if (infoEl) infoEl.textContent = catQuotes.length + " 則" + (myInCat > 0 ? " · 我投了 " + myInCat : "");
  }
}

function updateBar() {
  const used = myUsed();
  const rem = myRemaining();
  const globalTotal = Object.values(sharedVotes).reduce((a,b)=>a+b,0);

  const remEl = document.getElementById("remainingVal");
  if (remEl) {
    remEl.textContent = rem;
    remEl.className = "val" + (rem <= 10 ? " red" : "");
  }
  const usedEl = document.getElementById("usedVal");
  if (usedEl) usedEl.textContent = used + " / " + TOTAL_VOTES;
  const gEl = document.getElementById("globalVal");
  if (gEl) gEl.textContent = "🔥 " + globalTotal;
  const tEl = document.getElementById("totalVotesDisplay");
  if (tEl) tEl.textContent = globalTotal;
}

// ── Modal ──
window.openModal = function() {
  renderRanking();
  document.getElementById("modalOverlay").classList.add("active");
};
window.closeModal = function() {
  document.getElementById("modalOverlay").classList.remove("active");
};
window.closeModalOutside = function(e) {
  if (e.target === document.getElementById("modalOverlay")) window.closeModal();
};
window.setFilter = function(f) {
  rankFilter = f;
  renderRanking();
};

function renderRanking() {
  const filterBar = document.getElementById("filterBar");
  const rankList = document.getElementById("rankList");
  const modalSub = document.getElementById("modalSub");

  const filters = [{id:"ALL",label:"全部"}, ...CATEGORIES.map(c=>({id:c.id,label:c.id+"·"+c.name}))];
  filterBar.innerHTML = filters.map(f =>
    `<button class="f-btn${rankFilter===f.id?' active':''}" onclick="setFilter('${f.id}')">${f.label}</button>`
  ).join("");

  const ranked = QUOTES
    .filter(q => rankFilter === "ALL" || q.cat === rankFilter)
    .map(q => ({...q, total: sharedVotes[q.id] || 0}))
    .filter(q => q.total > 0)
    .sort((a,b) => b.total - a.total);

  const globalTotal = Object.values(sharedVotes).reduce((a,b)=>a+b,0);
  modalSub.textContent = `全體累計 ${globalTotal} 票 · 顯示 ${ranked.length} 則有票項目`;

  if (ranked.length === 0) {
    rankList.innerHTML = `<div class="no-votes">尚未有人投票，快去投你喜歡的金句！</div>`;
    return;
  }

  rankList.innerHTML = ranked.map((q, i) => {
    const cat = CATEGORIES.find(c => c.id === q.cat);
    const medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":null;
    const mine = !!myVotes[q.id];
    return `
      <li class="rank-item" style="animation-delay:${i*0.03}s">
        <div class="rank-num${medal?' top':''}">${medal||(i+1)}</div>
        <div class="rank-content">
          <div class="rank-qnum">【${q.id}】</div>
          <div class="rank-text">${q.first} ${q.body.split("\n")[0]}</div>
          <div class="rank-cat" style="color:${CAT_COLORS[q.cat]}">${cat?.emoji} ${cat?.name}${mine?" · ✦ 我也投了":""}</div>
        </div>
        <div class="rank-votes"><div class="n">${q.total}</div><small>票</small></div>
      </li>
    `;
  }).join("");
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}
</script>
